    <div class="report-section">
      <div class="report-header">
        <h2>Reporte de Inventario</h2>
        <div class="report-actions">
          <input type="text" placeholder="🔍 Buscar">
          <button>📥 Descargar</button>

    <div class="report-section">

        <thead>
          <tr>
            <th>ID</th>
            <th>Producto</th>
            <th>Cantidad</th>
            <th>Ubicación</th>
